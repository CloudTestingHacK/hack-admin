name: Self-Service Team Onboarding

on:
  workflow_dispatch:
    inputs:
      team_name:
        description: 'Team name (lowercase, alphanumeric, hyphens only, e.g., alpha-squad)'
        required: true
        type: string
      team_members:
        description: 'Team members GitHub usernames (comma-separated, optional - can add later)'
        required: false
        type: string
      azure_location:
        description: 'Azure region for resources'
        required: true
        default: 'ukwest'
        type: choice
        options:
          - ukwest
          - eastus
          - westeurope
          - northeurope
          - westus

permissions:
  id-token: write
  contents: read

env:
  ORG_ADMINS: "Dominic-Batstone,Paromita-Roy,iancurtis"
  ORG_NAME: CloudTestingHacK

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate team name
        id: validate
        run: |
          TEAM_NAME="${{ github.event.inputs.team_name }}"
          
          if [[ ! "$TEAM_NAME" =~ ^[a-z0-9-]+$ ]]; then
            echo "❌ Error: Team name must be lowercase, alphanumeric, and hyphens only"
            exit 1
          fi
          
          if [ ${#TEAM_NAME} -lt 3 ]; then
            echo "❌ Error: Team name must be at least 3 characters"
            exit 1
          fi
          
          RG_NAME="rg-hack-${TEAM_NAME}"
          REPO_NAME="team-${TEAM_NAME}"
          
          echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT

      - name: Check if team already exists
        id: check_team
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          if gh api /orgs/${{ env.ORG_NAME }}/teams/${{ steps.validate.outputs.team_name }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Team
        if: steps.check_team.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          TEAM_NAME="${{ steps.validate.outputs.team_name }}"
          echo "���️ Creating GitHub team: $TEAM_NAME"
          gh api --method POST -H "Accept: application/vnd.github+json" \
            /orgs/${{ env.ORG_NAME }}/teams \
            -f name="$TEAM_NAME" \
            -f description="Hackathon team for $TEAM_NAME" \
            -f privacy="closed"
          sleep 2

      - name: Add Org Admins to Team
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          TEAM_SLUG="${{ steps.validate.outputs.team_name }}"
          echo "��� Adding organization admins..."
          IFS=',' read -ra ADMINS <<< "${{ env.ORG_ADMINS }}"
          for admin in "${ADMINS[@]}"; do
            admin=$(echo "$admin" | xargs)
            gh api --method PUT -H "Accept: application/vnd.github+json" \
              /orgs/${{ env.ORG_NAME }}/teams/$TEAM_SLUG/memberships/$admin \
              -f role="maintainer" || echo "⚠️ Could not add $admin"
          done

      - name: Add Team Members
        if: github.event.inputs.team_members != ''
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          TEAM_SLUG="${{ steps.validate.outputs.team_name }}"
          IFS=',' read -ra MEMBERS <<< "${{ github.event.inputs.team_members }}"
          for member in "${MEMBERS[@]}"; do
            member=$(echo "$member" | xargs)
            [ -n "$member" ] && gh api --method PUT \
              /orgs/${{ env.ORG_NAME }}/teams/$TEAM_SLUG/memberships/$member \
              -f role="member" || true
          done

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Azure Resource Group
        run: |
          az group create \
            --name "${{ steps.validate.outputs.rg_name }}" \
            --location "${{ github.event.inputs.azure_location }}" \
            --tags team="${{ steps.validate.outputs.team_name }}" \
              event="MOJGHCPHack4Testers" \
              created="$(date -u +%Y-%m-%d)"

      - name: Create Team Repository
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          gh api --method POST /orgs/${{ env.ORG_NAME }}/repos \
            -f name="${{ steps.validate.outputs.repo_name }}" \
            -f description="Hackathon repository for ${{ steps.validate.outputs.team_name }}" \
            -F private=false -F has_issues=true
          sleep 3

      - name: Give Team Admin Access
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            /orgs/${{ env.ORG_NAME }}/teams/${{ steps.validate.outputs.team_name }}/repos/${{ env.ORG_NAME }}/${{ steps.validate.outputs.repo_name }} \
            -f permission="admin"

      - name: Setup Repository Content
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          TEAM_NAME: ${{ steps.validate.outputs.team_name }}
          RG_NAME: ${{ steps.validate.outputs.rg_name }}
          LOCATION: ${{ github.event.inputs.azure_location }}
          REPO_NAME: ${{ steps.validate.outputs.repo_name }}
          ORG: ${{ env.ORG_NAME }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TENANT_ID: f0380713-9d98-4d52-bbb0-abb7dc56c958
        run: |
          git clone https://oauth2:$GH_TOKEN@github.com/$ORG/$REPO_NAME.git
          cd $REPO_NAME
          
          # Create README
          cat > README.md << 'EOFREADME'
          # Team TEAM_NAME_PLACEHOLDER - MOJGHCPHack4Testers
          
          Welcome to your team's repository! Everything is set up and ready to deploy to Azure.
          
          ---
          
          ## 🎯 Your Azure Resources
          
          | Resource | Value |
          |----------|-------|
          | **Resource Group** | `RG_NAME_PLACEHOLDER` |
          | **Location** | `LOCATION_PLACEHOLDER` |
          | **Subscription** | MOJGHCPHack4Testers |
          
          ### 🔗 Quick Links
          
          - **[Open Resource Group in Azure Portal](https://portal.azure.com/#@TENANT_ID_PLACEHOLDER/resource/subscriptions/SUBSCRIPTION_ID_PLACEHOLDER/resourceGroups/RG_NAME_PLACEHOLDER/overview)**
          - **[View Subscription](https://portal.azure.com/#@TENANT_ID_PLACEHOLDER/resource/subscriptions/SUBSCRIPTION_ID_PLACEHOLDER/overview)**
          
          ---
          
          ## 🚀 How to Deploy to Azure
          
          Your repository is configured with **automated deployment**. Here's how it works:
          
          ### Quick Deploy:
          
          1. **Edit `infra/main.bicep`** - Add your Azure resources (examples below)
          2. **Commit and push** to the `main` branch
          3. **GitHub Actions automatically deploys** to Azure
          4. **Check the Actions tab** to see deployment progress
          
          ### 📋 Example: Deploy a Storage Account
          
          Edit `infra/main.bicep` and add:
          
          ```bicep
          targetScope = 'resourceGroup'
          param location string = resourceGroup().location
          
          resource storageAccount 'Microsoft.Storage/storageAccounts@2023-01-01' = {
            name: 'st\${uniqueString(resourceGroup().id)}'
            location: location
            sku: {
              name: 'Standard_LRS'
            }
            kind: 'StorageV2'
          }
          ```
          
          ### 📋 Example: Deploy a Web App
          
          ```bicep
          resource appServicePlan 'Microsoft.Web/serverfarms@2023-01-01' = {
            name: 'plan-\${uniqueString(resourceGroup().id)}'
            location: location
            sku: {
              name: 'B1'
              tier: 'Basic'
            }
          }
          
          resource webApp 'Microsoft.Web/sites@2023-01-01' = {
            name: 'app-\${uniqueString(resourceGroup().id)}'
            location: location
            properties: {
              serverFarmId: appServicePlan.id
            }
          }
          ```
          
          ---
          
          ## 🔒 Authentication
          
          Your deployments use **Azure Workload Identity (OIDC)** for secure authentication. All credentials are managed as **organization secrets** - no passwords or keys in your code!
          
          The deployment workflow automatically uses:
          - `AZURE_CLIENT_ID` - Service principal (managed by admins)
          - `AZURE_TENANT_ID` - Azure AD tenant (managed by admins)
          - `AZURE_SUBSCRIPTION_ID` - Target subscription (managed by admins)
          
          **You don't need to configure anything - it just works!** ✨
          
          ---
          
          ## 📁 Repository Structure
          
          ```
          .
          ├── .github/
          │   └── workflows/
          │       └── deploy.yml          # Automated Azure deployment
          ├── infra/
          │   └── main.bicep              # Your infrastructure code
          ├── .gitignore
          └── README.md                   # This file
          ```
          
          ---
          
          ## 🔍 Monitoring Deployments
          
          - **GitHub Actions**: Go to the [Actions tab](../../actions) to see deployment logs
          - **Azure Portal**: Use the [Resource Group link](https://portal.azure.com/#@TENANT_ID_PLACEHOLDER/resource/subscriptions/SUBSCRIPTION_ID_PLACEHOLDER/resourceGroups/RG_NAME_PLACEHOLDER/overview) to view deployed resources
          
          ---
          
          ## 📚 Helpful Resources
          
          - [Bicep Documentation](https://learn.microsoft.com/azure/azure-resource-manager/bicep/)
          - [Azure Quickstart Templates](https://github.com/Azure/azure-quickstart-templates)
          - [Azure Resource Reference](https://learn.microsoft.com/azure/templates/)
          
          ---
          
          ## 👥 Team Administrators
          
          Need help? Contact:
          - Dominic Batstone ([@Dominic-Batstone](https://github.com/Dominic-Batstone))
          - Paromita Roy ([@Paromita-Roy](https://github.com/Paromita-Roy))
          - Ian Curtis ([@iancurtis](https://github.com/iancurtis))
          
          ---
          
          **Happy Hacking! 🚀**
          EOFREADME
          
          # Replace placeholders
          sed -i "s|TEAM_NAME_PLACEHOLDER|$TEAM_NAME|g" README.md
          sed -i "s|RG_NAME_PLACEHOLDER|$RG_NAME|g" README.md
          sed -i "s|LOCATION_PLACEHOLDER|$LOCATION|g" README.md
          sed -i "s|SUBSCRIPTION_ID_PLACEHOLDER|$SUBSCRIPTION_ID|g" README.md
          sed -i "s|TENANT_ID_PLACEHOLDER|$TENANT_ID|g" README.md
          
          # Create workflows
          mkdir -p .github/workflows
          cat > .github/workflows/deploy.yml << 'EOFWORKFLOW'
          name: Deploy to Azure
          on:
            push:
              branches: [main]
          permissions:
            id-token: write
            contents: read
          jobs:
            deploy:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: azure/login@v2
                  with:
                    client-id: ${{ secrets.AZURE_CLIENT_ID }}
                    tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                    subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                - run: |
                    [ -f infra/main.bicep ] && az deployment group create \
                      --resource-group RESOURCE_GROUP_PLACEHOLDER \
                      --template-file infra/main.bicep || echo "No template"
          EOFWORKFLOW
          
          # Replace placeholder with actual resource group
          sed -i "s/RESOURCE_GROUP_PLACEHOLDER/$RG_NAME/g" .github/workflows/deploy.yml
          
          # Create Bicep template
          mkdir -p infra
          cat > infra/main.bicep << 'EOF'
          targetScope = 'resourceGroup'
          param location string = resourceGroup().location
          // Add your resources here
          EOF
          
          # Create .gitignore
          echo ".azure/" > .gitignore
          echo "*.log" >> .gitignore
          
          # Commit
          git config user.name "Hackathon Bot"
          git config user.email "noreply@github.com"
          git add .
          git commit -m "Initial setup"
          git branch -M main
          git push origin main

      - name: Summary
        run: |
          echo "## ✅ Team Onboarding Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎉 Your team is ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **GitHub Team** | [View Team](https://github.com/orgs/${{ env.ORG_NAME }}/teams/${{ steps.validate.outputs.team_name }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitHub Repository** | [View Repo](https://github.com/${{ env.ORG_NAME }}/${{ steps.validate.outputs.repo_name }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Azure Resource Group** | [Open in Portal](https://portal.azure.com/#@f0380713-9d98-4d52-bbb0-abb7dc56c958/resource/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ steps.validate.outputs.rg_name }}/overview) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Check out your repository README for deployment instructions" >> $GITHUB_STEP_SUMMARY
          echo "2. Edit \`infra/main.bicep\` to add Azure resources" >> $GITHUB_STEP_SUMMARY
          echo "3. Push to main branch to trigger automatic deployment" >> $GITHUB_STEP_SUMMARY
